<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지운T 홈페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        :root {
            --cat-pink: #ffc8dd;
        }

        body {
            font-family: 'Gaegu', cursive;
            background-color: #fff5f8;
            /* 고양이 발바닥 배경 패턴 유지 */
            background-image: url("https://www.transparenttextures.com/patterns/paws.png");
            /* 고양이 발바닥 커서 유지 */
            cursor: url('https://img.icons8.com/m_outlined/32/FF85A1/cat-footprint.png'), auto;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 고양이 귀 모양 제목 장식 */
        .cat-ears-title {
            position: relative;
            display: inline-block;
            background-color: white;
            padding: 2.5rem 5rem;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            border: 3px solid #ffc8dd;
        }

        .cat-ears-title::before, .cat-ears-title::after {
            content: '';
            position: absolute;
            top: -20px;
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 50% 50% 0 0;
            z-index: -1;
            border: 4px solid #ffc8dd;
        }

        .cat-ears-title::before { 
            left: 30px; 
            transform: rotate(-15deg); 
        }

        .cat-ears-title::after { 
            right: 30px; 
            transform: rotate(15deg); 
        }

        h1 {
            margin: 0;
            font-size: 4rem;
            color: #ff85a1;
            font-weight: 700;
        }

        /* 배경에 떠다니는 발바닥 이모지 (장식용) */
        .floating-paws {
            position: fixed;
            font-size: 2rem;
            opacity: 0.2;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="cat-ears-title">
        <h1>지운T 홈페이지</h1>
    </div>

    <!-- 배경 장식 이모지들 -->
    <div class="floating-paws" style="top: 15%; left: 10%;">🐾</div>
    <div class="floating-paws" style="top: 70%; left: 15%;">🐾</div>
    <div class="floating-paws" style="top: 25%; right: 12%;">🐾</div>
    <div class="floating-paws" style="top: 80%; right: 20%;">🐾</div>

</body>
</html>
