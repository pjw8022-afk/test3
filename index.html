<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지운T의 고양이 캔버스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        :root {
            --cat-pink: #ffc8dd;
        }

        body {
            font-family: 'Gaegu', cursive;
            background-color: #fff5f8;
            background-image: url("https://www.transparenttextures.com/patterns/paws.png");
            cursor: url('https://img.icons8.com/m_outlined/32/FF85A1/cat-footprint.png'), auto;
            margin: 0;
            padding: 0;
        }

        /* 고양이 귀 장식 */
        .cat-ears-title {
            position: relative;
            display: inline-block;
        }
        .cat-ears-title::before, .cat-ears-title::after {
            content: '';
            position: absolute;
            top: -15px;
            width: 30px;
            height: 30px;
            background-color: white;
            border-radius: 50% 50% 0 0;
            z-index: -1;
            border: 3px solid #ffc8dd;
        }
        .cat-ears-title::before { left: 10px; transform: rotate(-15deg); }
        .cat-ears-title::after { right: 10px; transform: rotate(15deg); }

        .cat-image-container {
            border: 8px solid white;
            box-shadow: 0 8px 25px rgba(255, 182, 193, 0.4);
            transition: transform 0.3s ease;
        }

        .cat-image-container:hover {
            transform: scale(1.02) rotate(1deg);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--cat-pink);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Title Only -->
    <div class="text-center mt-10 mb-16">
        <div class="cat-ears-title bg-white px-10 py-5 rounded-[40px] shadow-lg border-2 border-pink-100">
            <h1 class="text-5xl md:text-6xl font-bold text-pink-400">지운T's CATS</h1>
        </div>
    </div>

    <!-- Pure Cat Gallery -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="image-wall">
        <!-- AI Generated Cat Images will appear here -->
    </div>

    <div class="text-center py-20 opacity-30 text-4xl">
        🐾 🐾 🐾
    </div>

    <script>
        const apiKey = "";

        async function createCatFrame(prompt, id) {
            const wall = document.getElementById('image-wall');
            
            const frame = document.createElement('div');
            frame.className = 'cat-image-container aspect-square bg-white rounded-[35px] overflow-hidden flex items-center justify-center relative';
            frame.innerHTML = `<div id="loader-${id}" class="loader"></div>`;
            wall.appendChild(frame);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: `${prompt}, adorable, professional photography, soft studio lighting, cute cat, pastel background` }],
                        parameters: { sampleCount: 1 }
                    })
                });

                const result = await response.json();
                if (result.predictions && result.predictions[0].bytesBase64Encoded) {
                    const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    frame.innerHTML = `<img src="${imageUrl}" class="w-full h-full object-cover animate__animated animate__fadeIn">`;
                }
            } catch (e) {
                frame.innerHTML = '<span class="text-5xl">🐱</span>';
            }
        }

        window.onload = () => {
            const prompts = [
                "cute fluffy white kitten with blue eyes",
                "fat ginger cat sitting on a pink cushion",
                "scottish fold cat peeking from behind a curtain",
                "tiny calico kitten playing with a ball",
                "elegant siberian cat with thick fur",
                "cute black cat with big yellow eyes",
                "two kittens sleeping together in a basket",
                "munchkin cat wearing a small pink ribbon",
                "smiling happy cat looking at the camera"
            ];

            prompts.forEach((p, index) => createCatFrame(p, index));
        };
    </script>
</body>
</html>
