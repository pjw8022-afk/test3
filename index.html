<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지운T의 말랑말랑 고양이 세상</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        :root {
            --cat-pink: #ffc8dd;
            --cat-blue: #a2d2ff;
            --cat-yellow: #ffedaf;
        }

        body {
            font-family: 'Gaegu', cursive;
            background-color: #fff5f8;
            background-image: url("https://www.transparenttextures.com/patterns/paws.png");
            cursor: url('https://img.icons8.com/m_outlined/32/FF85A1/cat-footprint.png'), auto;
            scroll-behavior: smooth;
        }

        /* 고양이 귀 모양 장식 */
        .cat-ears-container {
            position: relative;
        }
        .cat-ears-container::before, .cat-ears-container::after {
            content: '';
            position: absolute;
            top: -20px;
            width: 40px;
            height: 40px;
            background-color: white;
            border-radius: 50% 50% 0 0;
            z-index: -1;
        }
        .cat-ears-container::before { left: 20px; transform: rotate(-15deg); }
        .cat-ears-container::after { right: 20px; transform: rotate(15deg); }

        .floating-cat {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .cat-card {
            border: 4px solid white;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.3);
        }

        .cat-card:hover {
            transform: translateY(-10px) rotate(2deg);
            box-shadow: 0 15px 30px rgba(255, 182, 193, 0.5);
        }

        .custom-loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--cat-pink);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #fff5f8; }
        ::-webkit-scrollbar-thumb { background: var(--cat-pink); border-radius: 10px; }
    </style>
</head>
<body class="text-gray-700">

    <!-- Header -->
    <header class="py-12 text-center relative overflow-hidden">
        <div class="absolute top-10 left-10 text-6xl opacity-20 floating-cat">🐾</div>
        <div class="absolute bottom-10 right-10 text-6xl opacity-20 floating-cat" style="animation-delay: 1s;">🐱</div>
        
        <div class="inline-block bg-white p-8 rounded-[50px] shadow-xl cat-ears-container mb-6 border-4 border-pink-100">
            <h1 class="text-5xl md:text-7xl font-bold text-pink-400">지운T의 냥지트</h1>
            <p class="text-2xl mt-2 text-pink-300">세상에서 가장 귀여운 것들만 모아둔 곳</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 pb-20">
        
        <!-- Welcome Section -->
        <section class="bg-white/60 backdrop-blur-sm p-10 rounded-[40px] text-center mb-16 border-2 border-white">
            <div id="hero-img-box" class="w-48 h-48 mx-auto mb-6 rounded-full overflow-hidden border-4 border-white shadow-lg bg-pink-50 flex items-center justify-center">
                <div class="custom-loader"></div>
            </div>
            <h2 class="text-3xl font-bold mb-4">"반가워요 냥!"</h2>
            <p class="text-xl leading-relaxed">
                지운T의 홈페이지는 오직 귀여운 고양이들을 감상하기 위해 만들어졌습니다.<br>
                복잡한 생각은 버리고 말랑말랑한 고양이들을 구경하며 힐링하세요.
            </p>
        </section>

        <!-- Cat Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10" id="main-grid">
            <!-- Images will be generated here -->
        </div>

    </main>

    <footer class="py-12 bg-pink-100 text-center">
        <div class="text-4xl mb-4">🐈💨</div>
        <p class="text-pink-500 font-bold">지운T와 고양이들이 함께합니다</p>
        <p class="text-pink-300 text-sm mt-2">© 2024 Jiun-T Cat Haven</p>
    </footer>

    <script>
        const apiKey = "";

        // 이미지 생성 함수
        async function fetchCat(prompt, containerId) {
            const container = document.getElementById(containerId);
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: `${prompt}, adorable, round eyes, soft fur, hyper-realistic but cute, pastel theme` }],
                        parameters: { sampleCount: 1 }
                    })
                });

                const result = await response.json();
                if (result.predictions && result.predictions[0].bytesBase64Encoded) {
                    const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    container.innerHTML = `<img src="${imageUrl}" class="w-full h-full object-cover animate__animated animate__zoomIn">`;
                }
            } catch (error) {
                container.innerHTML = '<span class="text-4xl">🐱</span>';
            }
        }

        // 초기화
        window.onload = () => {
            // 메인 히어로 고양이
            fetchCat("chubby cream colored cat wearing a tiny yellow bow tie", "hero-img-box");

            // 고양이 리스트
            const grid = document.getElementById('main-grid');
            const catStyles = [
                "tiny kitten peeking out of a pink coffee mug",
                "fluffy grey munchkin cat standing on hind legs",
                "cute calico cat sleeping on a cloud",
                "golden tabby cat playing with a pink butterfly",
                "white cat with heart shaped spot on its fur",
                "ragdoll cat looking at the camera with big blue eyes"
            ];

            catStyles.forEach((style, i) => {
                const card = document.createElement('div');
                card.className = 'cat-card bg-white p-4 rounded-[30px] overflow-hidden';
                card.innerHTML = `
                    <div id="cat-item-${i}" class="aspect-[4/3] rounded-[20px] overflow-hidden bg-gray-50 flex items-center justify-center mb-4">
                        <div class="custom-loader"></div>
                    </div>
                    <div class="flex justify-between items-center px-2">
                        <span class="text-xl font-bold text-pink-400">냥냥이 #${i+1}</span>
                        <span class="text-2xl">💖</span>
                    </div>
                `;
                grid.appendChild(card);
                fetchCat(style, `cat-item-${i}`);
            });
        };
    </script>
</body>
</html>
