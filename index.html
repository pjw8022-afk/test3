<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지운T의 고양이 왕국</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        :root {
            --cat-primary: #ffb7b2;
            --cat-secondary: #ffdac1;
            --cat-accent: #b5ead7;
        }

        body {
            font-family: 'Gaegu', cursive;
            background-color: #fff9f0;
            overflow-x: hidden;
        }

        .cat-float {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .paw-print {
            position: absolute;
            pointer-events: none;
            opacity: 0.6;
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
            z-index: 0;
        }

        .cat-card:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .custom-loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--cat-primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #cat-toy {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #cat-toy:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md border-b border-pink-100 z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold text-pink-500 flex items-center gap-2">
                🐾 지운T
            </h1>
            <ul class="flex space-x-6 text-xl">
                <li><a href="#home" class="hover:text-pink-400 transition">홈</a></li>
                <li><a href="#gallery" class="hover:text-pink-400 transition">고양이 갤러리</a></li>
                <li><a href="#interactive" class="hover:text-pink-400 transition">놀이터</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="pt-32 pb-20 px-4 min-h-screen flex flex-col items-center justify-center text-center">
        <div class="relative inline-block">
            <div id="hero-cat-container" class="w-64 h-64 md:w-80 md:h-80 rounded-full overflow-hidden border-8 border-pink-200 shadow-2xl mb-8 cat-float bg-pink-50 flex items-center justify-center">
                <!-- Image will be generated here -->
                <div class="custom-loader" id="hero-loader"></div>
            </div>
            <div class="absolute -top-4 -right-4 bg-yellow-300 p-3 rounded-full text-2xl animate-bounce">✨</div>
        </div>
        <h2 class="text-5xl md:text-7xl font-bold mb-4 text-pink-600">지운T의 냥냥하우스</h2>
        <p class="text-2xl md:text-3xl text-gray-600 mb-8 max-w-2xl">
            고양이를 사랑하는 지운T의 공간에 오신 것을 환영합니다! <br>
            여기는 세상에서 가장 귀여운 고양이들만 모여있어요.
        </p>
        <button onclick="meow()" class="bg-pink-400 text-white px-8 py-4 rounded-full text-2xl shadow-lg hover:bg-pink-500 transition-all transform active:scale-95">
            고양이랑 인사하기 🐾
        </button>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="py-20 bg-pink-50">
        <div class="max-w-6xl mx-auto px-4">
            <h3 class="text-4xl font-bold text-center mb-12 text-gray-700">지운T의 냥친구들</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="cat-grid">
                <!-- Gallery items will be populated by JS -->
            </div>
        </div>
    </section>

    <!-- Interactive Section -->
    <section id="interactive" class="py-20 min-h-screen relative overflow-hidden bg-white">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h3 class="text-4xl font-bold mb-6">고양이 놀이터</h3>
            <p class="text-xl text-gray-600 mb-12">화면을 클릭하면 고양이 발자국이 남아요!</p>
            <div class="p-10 border-4 border-dashed border-pink-200 rounded-3xl bg-pink-50/50" id="play-area">
                <p class="text-4xl py-20 text-pink-300 opacity-50">이곳을 클릭하며 놀아주세요!</p>
            </div>
        </div>
    </section>

    <!-- Floating Action Button -->
    <div id="cat-toy" title="간식 주기" class="bg-yellow-400 p-5 rounded-full shadow-2xl text-3xl">
        🐟
    </div>

    <footer class="bg-gray-800 text-white py-10 text-center">
        <p class="text-xl">© 2024 지운T - All Cats are Beautiful 🐈</p>
    </footer>

    <script>
        const apiKey = ""; // API key is handled by the environment

        // 1. Image Generation Logic (Imagen 4.0)
        async function generateCatImage(prompt, containerId, loaderId) {
            const container = document.getElementById(containerId);
            const loader = document.getElementById(loaderId);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: `A very cute and fluffy ${prompt}, high quality, soft lighting, pastel background, art style: digital illustration` }],
                        parameters: { sampleCount: 1 }
                    })
                });

                const result = await response.json();
                if (result.predictions && result.predictions[0].bytesBase64Encoded) {
                    const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.className = 'w-full h-full object-cover animate__animated animate__fadeIn';
                    container.innerHTML = '';
                    container.appendChild(img);
                }
            } catch (error) {
                console.error("Image generation failed", error);
                container.innerHTML = '<div class="text-4xl">🐱</div>'; // Fallback
            }
        }

        // 2. Populate Gallery
        const catBreeds = [
            "calico kitten sitting on a blanket",
            "white persian cat with blue eyes",
            "scottish fold cat playing with a ball of yarn",
            "ginger cat sleeping peacefully",
            "british shorthair wearing a small crown",
            "cute siamese cat looking curious"
        ];

        function createGallery() {
            const grid = document.getElementById('cat-grid');
            catBreeds.forEach((breed, index) => {
                const card = document.createElement('div');
                card.className = 'cat-card bg-white p-4 rounded-2xl shadow-md transition-all duration-300';
                card.innerHTML = `
                    <div id="gallery-cat-${index}" class="aspect-square bg-gray-100 rounded-xl mb-4 overflow-hidden flex items-center justify-center">
                        <div class="custom-loader"></div>
                    </div>
                    <p class="text-center font-bold text-xl text-gray-700">고양이 친구 #${index + 1}</p>
                `;
                grid.appendChild(card);
                generateCatImage(breed, `gallery-cat-${index}`, null);
            });
        }

        // 3. Interactive Footprints
        document.addEventListener('mousedown', (e) => {
            const paw = document.createElement('div');
            paw.className = 'paw-print text-3xl animate__animated animate__zoomIn';
            paw.innerHTML = '🐾';
            paw.style.left = (e.pageX - 15) + 'px';
            paw.style.top = (e.pageY - 15) + 'px';
            paw.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(paw);

            setTimeout(() => {
                paw.style.opacity = '0';
                paw.style.transform += ' scale(2)';
                setTimeout(() => paw.remove(), 500);
            }, 1000);
        });

        // 4. Meow Sound Effect (Visual)
        function meow() {
            const meows = ["야옹~", "냥!", "미유~", "Meow!", "애옹"];
            const text = meows[Math.floor(Math.random() * meows.length)];
            
            const speech = document.createElement('div');
            speech.className = 'fixed font-bold text-pink-500 text-3xl pointer-events-none z-[60]';
            speech.innerText = text;
            speech.style.left = (window.innerWidth / 2 + (Math.random() * 200 - 100)) + 'px';
            speech.style.top = (window.innerHeight / 2 - 100) + 'px';
            
            document.body.appendChild(speech);
            
            let y = window.innerHeight / 2 - 100;
            const anim = setInterval(() => {
                y -= 2;
                speech.style.top = y + 'px';
                speech.style.opacity = parseFloat(speech.style.opacity || 1) - 0.02;
                if (parseFloat(speech.style.opacity) <= 0) {
                    clearInterval(anim);
                    speech.remove();
                }
            }, 20);
        }

        // 5. Fish Toy Interaction
        const toy = document.getElementById('cat-toy');
        toy.addEventListener('click', () => {
            toy.innerHTML = '🍗';
            setTimeout(() => toy.innerHTML = '🐟', 1000);
            meow();
        });

        // Initialize
        window.onload = () => {
            generateCatImage("cute chubby cat mascot for a teacher named Jiun", "hero-cat-container", "hero-loader");
            createGallery();
        };
    </script>
</body>
</html>
