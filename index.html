<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지운T 홈페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        :root {
            --cat-pink: #ffc8dd;
            --cat-dark-pink: #ff85a1;
        }

        body {
            font-family: 'Gaegu', cursive;
            background-color: #fff5f8;
            background-image: url("https://www.transparenttextures.com/patterns/paws.png");
            cursor: url('https://img.icons8.com/m_outlined/32/FF85A1/cat-footprint.png'), auto;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 상단 제목 스타일 */
        .header-section {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 4rem 0 2rem 0;
        }

        .cat-ears-title {
            position: relative;
            display: inline-block;
            background-color: white;
            padding: 1.5rem 4rem;
            border-radius: 40px;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.2);
            border: 3px solid var(--cat-pink);
        }

        .cat-ears-title::before, .cat-ears-title::after {
            content: '';
            position: absolute;
            top: -15px;
            width: 40px;
            height: 40px;
            background-color: white;
            border-radius: 50% 50% 0 0;
            z-index: -1;
            border: 3px solid var(--cat-pink);
        }

        .cat-ears-title::before { left: 25px; transform: rotate(-15deg); }
        .cat-ears-title::after { right: 25px; transform: rotate(15deg); }

        h1 {
            margin: 0;
            font-size: 3.5rem;
            color: var(--cat-dark-pink);
            font-weight: 700;
        }

        /* 메인 콘텐츠 영역 (중앙 버튼) */
        .content-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .study-button {
            background-color: white;
            color: var(--cat-dark-pink);
            font-size: 2.5rem;
            font-weight: 700;
            padding: 1.5rem 3.5rem;
            border-radius: 30px;
            border: 4px solid var(--cat-pink);
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: inline-block;
        }

        .study-button:hover {
            transform: scale(1.1) rotate(-2deg);
            background-color: var(--cat-pink);
            color: white;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.5);
        }

        /* 클릭 시 나타나는 발자국 스타일 */
        .click-paw {
            position: absolute;
            font-size: 2.5rem;
            pointer-events: none;
            z-index: 100;
            animation: fadeOutUp 0.8s forwards;
            color: var(--cat-dark-pink);
            opacity: 0.7;
        }

        @keyframes fadeOutUp {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
        }

        /* 배경 장식 */
        .floating-paws {
            position: fixed;
            font-size: 2rem;
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- 상단 제목 -->
    <header class="header-section">
        <div class="cat-ears-title">
            <h1>지운T 홈페이지</h1>
        </div>
    </header>

    <!-- 중앙 버튼 -->
    <main class="content-section">
        <a href="./01/index.html" class="study-button">
            일본어 읽기 연습 🇯🇵
        </a>
    </main>

    <!-- 배경 장식 이모지들 -->
    <div class="floating-paws" style="top: 15%; left: 10%;">🐾</div>
    <div class="floating-paws" style="top: 70%; left: 15%;">🐾</div>
    <div class="floating-paws" style="top: 25%; right: 12%;">🐾</div>
    <div class="floating-paws" style="top: 80%; right: 20%;">🐾</div>

    <script>
        // 마우스 클릭 이벤트: 발자국 생성
        document.addEventListener('mousedown', (e) => {
            const paw = document.createElement('div');
            paw.className = 'click-paw';
            paw.innerHTML = '🐾';
            
            // 클릭 위치에 중앙 정렬하여 배치
            paw.style.left = (e.pageX - 20) + 'px';
            paw.style.top = (e.pageY - 20) + 'px';
            
            // 랜덤 각도 부여
            const randomRotate = Math.random() * 360;
            paw.style.transform = `rotate(${randomRotate}deg)`;
            
            document.body.appendChild(paw);

            // 애니메이션 종료 후 요소 제거
            setTimeout(() => {
                paw.remove();
            }, 800);
        });
    </script>
</body>
</html>
