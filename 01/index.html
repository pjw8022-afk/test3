<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본어 읽기 연습</title>
<style>
  :root{
    --bg:#f6f8fb;
    --text:#1f2937;
    --muted:#6b7280;
    --card:#ffffff;
    --blue:#4facfe;
    --cyan:#00f2fe;
    --purple:#a18cd1;
    --pink:#fbc2eb;
    --green:#22c55e;
    --red:#ef4444;
    --orange:#fb923c;
    --shadow:0 12px 28px rgba(15,23,42,.12);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    text-align:center;
    font-family:Arial, 'Malgun Gothic', sans-serif;
    background:radial-gradient(circle at top, #ffffff 0%, var(--bg) 45%, #edf2f7 100%);
    color:var(--text);
  }

  .page{
    width:min(980px, calc(100% - 32px));
    margin:0 auto;
    padding:30px 0 44px;
  }

  h1{
    margin:0 0 8px;
    font-size:34px;
    letter-spacing:-.04em;
  }

  .sub{
    margin:0 0 24px;
    color:var(--muted);
    font-size:15px;
  }

  .panel{
    background:rgba(255,255,255,.8);
    border:1px solid rgba(255,255,255,.9);
    border-radius:24px;
    box-shadow:var(--shadow);
    padding:24px;
    backdrop-filter:blur(10px);
  }

  .menu{
    display:grid;
    grid-template-columns:repeat(4, minmax(160px, 1fr));
    gap:16px;
    margin-top:18px;
  }

  .menu-card{
    min-height:145px;
    padding:24px 16px;
    border-radius:22px;
    cursor:pointer;
    color:white;
    font-size:18px;
    font-weight:700;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    box-shadow:0 12px 22px rgba(15,23,42,.16);
    transform:translateY(0);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    user-select:none;
  }

  .menu-card:hover{
    transform:translateY(-5px);
    box-shadow:0 18px 30px rgba(15,23,42,.2);
    filter:saturate(1.08);
  }

  .menu-card small{
    font-size:13px;
    font-weight:500;
    opacity:.92;
    line-height:1.35;
  }

  .single{ background:linear-gradient(135deg,#4facfe,#00f2fe); }
  .comboBtn{ background:linear-gradient(135deg,#a18cd1,#fbc2eb); }
  .singleQuiz{ background:linear-gradient(135deg,#22c55e,#86efac); }
  .comboQuiz{ background:linear-gradient(135deg,#fb923c,#facc15); }

  #app{ display:none; }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }

  #modeTitle{
    margin:0;
    font-size:25px;
    letter-spacing:-.03em;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:8px 12px;
    border-radius:999px;
    background:#eef2ff;
    color:#3730a3;
    font-size:13px;
    font-weight:700;
  }

  .row{
    display:flex;
    justify-content:center;
    gap:48px;
    margin:24px 0;
    flex-wrap:wrap;
  }

  .card{
    padding:24px 26px;
    border-radius:22px;
    min-width:190px;
    background:var(--card);
    box-shadow:0 10px 22px rgba(15,23,42,.08);
    border:1px solid #edf2f7;
  }

  .hira{ background:linear-gradient(180deg,#f8fbff,#eef5ff); }
  .kata{ background:linear-gradient(180deg,#fffaf5,#fff3e8); }

  .label{
    font-size:14px;
    color:var(--muted);
    font-weight:700;
    margin-bottom:10px;
  }

  .char{
    font-size:66px;
    line-height:1.05;
    min-height:76px;
  }

  .pron{
    font-size:23px;
    color:#2563eb;
    margin-top:12px;
    min-height:30px;
    font-weight:700;
  }

  .comboCard,
  .quizCard{
    display:inline-block;
    padding:34px 42px;
    border-radius:24px;
    background:linear-gradient(135deg,#ffffff,#f8fafc);
    box-shadow:0 12px 28px rgba(15,23,42,.12);
    margin:24px 0;
    min-width:min(540px, 100%);
    border:1px solid #eef2f7;
  }

  .comboText,
  .quizText{
    font-size:66px;
    line-height:1.08;
    word-break:keep-all;
    min-height:82px;
  }

  .comboPron,
  .quizAnswer{
    font-size:24px;
    color:#2563eb;
    margin-top:15px;
    min-height:34px;
    font-weight:700;
  }

  .quizInputWrap{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:18px auto 10px;
    max-width:520px;
  }

  #quizInput{
    width:100%;
    padding:14px 16px;
    border:2px solid #dbe3ef;
    border-radius:16px;
    font-size:20px;
    text-align:center;
    outline:none;
    background:#fff;
    transition:border-color .16s ease, box-shadow .16s ease;
  }

  #quizInput:focus{
    border-color:#60a5fa;
    box-shadow:0 0 0 4px rgba(96,165,250,.18);
  }

  #quizInput.correct{
    border-color:var(--green);
    background:#f0fdf4;
  }

  #quizInput.wrong{
    border-color:var(--red);
    background:#fef2f2;
  }

  .feedback{
    min-height:30px;
    font-size:17px;
    font-weight:800;
  }

  .feedback.correct{ color:var(--green); }
  .feedback.wrong{ color:var(--red); }

  .stats{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:16px 0 0;
  }

  .stat{
    background:#f8fafc;
    border:1px solid #e5e7eb;
    border-radius:999px;
    padding:8px 13px;
    font-size:14px;
    color:#374151;
    font-weight:700;
  }

  .progressWrap{
    width:min(440px, 100%);
    height:10px;
    margin:12px auto 0;
    border-radius:999px;
    background:#e5e7eb;
    overflow:hidden;
  }

  #progressBar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#22c55e,#60a5fa);
    transition:width .25s ease;
  }

  .controls{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
  }

  button{
    margin:0;
    padding:11px 16px;
    border:0;
    border-radius:14px;
    background:#111827;
    color:white;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    box-shadow:0 8px 16px rgba(17,24,39,.15);
  }

  button:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 20px rgba(17,24,39,.2);
  }

  button.secondary{ background:#4b5563; }
  button.answer{ background:#2563eb; }
  button.next{ background:#059669; }

  .homeArea{
    margin-top:20px;
    display:flex;
    justify-content:center;
  }

  .homeBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:150px;
    padding:11px 16px;
    border-radius:14px;
    background:#374151;
    color:white;
    font-size:15px;
    font-weight:700;
    text-decoration:none;
    box-shadow:0 8px 16px rgba(17,24,39,.15);
    transition:transform .15s ease, box-shadow .15s ease;
  }

  .homeBtn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 20px rgba(17,24,39,.2);
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:24px;
    transform:translateX(-50%) translateY(20px);
    background:#111827;
    color:#fff;
    padding:12px 16px;
    border-radius:999px;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    box-shadow:0 10px 20px rgba(15,23,42,.2);
    z-index:10;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .pop{
    animation:pop .22s ease;
  }

  @keyframes pop{
    0%{ transform:scale(.96); opacity:.65; }
    100%{ transform:scale(1); opacity:1; }
  }

  @media(max-width:820px){
    .menu{ grid-template-columns:repeat(2, minmax(150px, 1fr)); }
    .comboCard,.quizCard{ min-width:100%; padding:28px 22px; }
    .comboText,.quizText,.char{ font-size:54px; }
  }

  @media(max-width:480px){
    .page{ width:min(100% - 20px, 980px); padding-top:20px; }
    .panel{ padding:18px 14px; border-radius:20px; }
    .menu{ grid-template-columns:1fr; }
    .menu-card{ min-height:112px; }
    h1{ font-size:28px; }
    .quizInputWrap{ flex-direction:column; }
    button{ width:100%; }
    .controls{ flex-direction:column; }
  }
</style>
</head>
<body>
<div class="page">
  <h1>일본어 읽기 연습</h1>
  <p class="sub">숫자키로도 조작할 수 있습니다. 메뉴: 1~4 / 학습 중: 1 정답, 2 새 문제, 3 메뉴</p>

  <div id="menuWrap" class="panel">
    <h3>모드 선택</h3>
    <div class="menu">
      <div class="menu-card single" onclick="startSingle()">
        ① 단일 문자
        <small>히라가나와 가타카나 발음 확인</small>
      </div>
      <div class="menu-card comboBtn" onclick="startCombo()">
        ② 조합 연습
        <small>여러 글자를 이어 읽는 연습</small>
      </div>
      <div class="menu-card singleQuiz" onclick="startSingleQuiz()">
        ③ 단일문자 퀴즈
        <small>발음을 직접 입력해서 풀기</small>
      </div>
      <div class="menu-card comboQuiz" onclick="startComboQuiz()">
        ④ 조합연습 퀴즈
        <small>조합 발음을 직접 입력해서 풀기</small>
      </div>
    </div>
  </div>

  <div id="app" class="panel">
    <div class="topbar">
      <h2 id="modeTitle"></h2>
      <span id="hintBadge" class="badge">Enter: 확인 / 다음</span>
    </div>

    <div id="single" class="row" style="display:none;">
      <div class="card hira">
        <div class="label">히라가나</div>
        <div id="hiraChar" class="char"></div>
        <div id="hiraPron" class="pron"></div>
      </div>

      <div class="card kata">
        <div class="label">가타카나</div>
        <div id="kataChar" class="char"></div>
        <div id="kataPron" class="pron"></div>
      </div>
    </div>

    <div id="comboWrap" style="display:none;">
      <div class="comboCard">
        <div id="comboText" class="comboText"></div>
        <div id="comboPron" class="comboPron"></div>
      </div>
    </div>

    <div id="quizWrap" style="display:none;">
      <div class="quizCard">
        <div class="label" id="quizLabel">문제</div>
        <div id="quizText" class="quizText"></div>
        <div class="quizInputWrap">
          <input id="quizInput" type="text" autocomplete="off" placeholder="발음을 한글로 입력하세요. 예: 카, 시, 캬" />
        </div>
        <div id="quizFeedback" class="feedback"></div>
        <div id="quizAnswer" class="quizAnswer"></div>
      </div>

      <div class="stats">
        <span class="stat">정답 <b id="correctCount">0</b></span>
        <span class="stat">오답 <b id="wrongCount">0</b></span>
        <span class="stat">정답률 <b id="accuracy">0%</b></span>
      </div>
      <div class="progressWrap"><div id="progressBar"></div></div>
    </div>

    <div class="controls">
      <button class="answer" onclick="showAnswer()">정답 확인 (1)</button>
      <button class="next" onclick="generate()">새 문제 (2)</button>
      <button class="secondary" onclick="goMenu()">모드 선택 (3)</button>
    </div>
  </div>

  <div class="homeArea">
    <a class="homeBtn" href="../index.html">홈페이지로</a>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ===== 완전 문자 =====
const hira = [
"あ","い","う","え","お",
"か","き","く","け","こ","が","ぎ","ぐ","げ","ご",
"さ","し","す","せ","そ","ざ","じ","ず","ぜ","ぞ",
"た","ち","つ","て","と","だ","ぢ","づ","で","ど",
"な","に","ぬ","ね","の",
"は","ひ","ふ","へ","ほ","ば","び","ぶ","べ","ぼ","ぱ","ぴ","ぷ","ぺ","ぽ",
"ま","み","む","め","も",
"や","ゆ","よ",
"ら","り","る","れ","ろ",
"わ","を","ん",

// 요음
"きゃ","きゅ","きょ","しゃ","しゅ","しょ","ちゃ","ちゅ","ちょ",
"にゃ","にゅ","にょ","ひゃ","ひゅ","ひょ",
"みゃ","みゅ","みょ","りゃ","りゅ","りょ",
"ぎゃ","ぎゅ","ぎょ","じゃ","じゅ","じょ",
"びゃ","びゅ","びょ","ぴゃ","ぴゅ","ぴょ"
];

// ===== 발음 생성기 =====
function getPron(k){
  const base = k.replace(/[\u30a1-\u30f6]/g,
    c=>String.fromCharCode(c.charCodeAt(0)-0x60));

  const table = {
    "あ":"아","い":"이","う":"우","え":"에","お":"오",
    "か":"카","き":"키","く":"쿠","け":"케","こ":"코",
    "が":"가","ぎ":"기","ぐ":"구","げ":"게","ご":"고",
    "さ":"사","し":"시","す":"스","せ":"세","そ":"소",
    "ざ":"자","じ":"지","ず":"즈","ぜ":"제","ぞ":"조",
    "た":"타","ち":"치","つ":"츠","て":"테","と":"토",
    "だ":"다","ぢ":"지","づ":"즈","で":"데","ど":"도",
    "な":"나","に":"니","ぬ":"누","ね":"네","の":"노",
    "は":"하","ひ":"히","ふ":"후","へ":"헤","ほ":"호",
    "ば":"바","び":"비","ぶ":"부","べ":"베","ぼ":"보",
    "ぱ":"파","ぴ":"피","ぷ":"푸","ぺ":"페","ぽ":"포",
    "ま":"마","み":"미","む":"무","め":"메","も":"모",
    "や":"야","ゆ":"유","よ":"요",
    "ら":"라","り":"리","る":"루","れ":"레","ろ":"로",
    "わ":"와","を":"오","ん":"응",

    "きゃ":"캬","きゅ":"큐","きょ":"쿄",
    "しゃ":"샤","しゅ":"슈","しょ":"쇼",
    "ちゃ":"챠","ちゅ":"츄","ちょ":"초",
    "にゃ":"냐","にゅ":"뉴","にょ":"뇨",
    "ひゃ":"햐","ひゅ":"휴","ひょ":"효",
    "みゃ":"먀","みゅ":"뮤","みょ":"묘",
    "りゃ":"랴","りゅ":"류","りょ":"료",
    "ぎゃ":"갸","ぎゅ":"규","ぎょ":"교",
    "じゃ":"자","じゅ":"주","じょ":"조",
    "びゃ":"뱌","びゅ":"뷰","びょ":"뵤",
    "ぴゃ":"퍄","ぴゅ":"퓨","ぴょ":"표"
  };

  return table[base] || "";
}

// ===== 유틸 =====
function toKata(h){
  return h.replace(/[\u3041-\u3096]/g,
    c=>String.fromCharCode(c.charCodeAt(0)+0x60));
}

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function normalizeAnswer(v){
  return String(v || "")
    .replace(/\s+/g, "")
    .replace(/[.,!?。！？]/g, "")
    .trim();
}

function pop(el){
  el.classList.remove("pop");
  void el.offsetWidth;
  el.classList.add("pop");
}

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  clearTimeout(toast.timer);
  toast.timer=setTimeout(()=>t.classList.remove("show"), 1300);
}

// ===== 상태 =====
let mode="";
let quizAnswered=false;
let score={correct:0, wrong:0};

// ===== 모드 =====
function startSingle(){
  mode="single";
  openApp("단일 문자 연습", "히라가나와 가타카나를 따로 읽습니다.");
  single.style.display="flex";
  comboWrap.style.display="none";
  quizWrap.style.display="none";
  generate();
}

function startCombo(){
  mode="combo";
  openApp("조합 연습", "여러 글자를 이어서 읽습니다.");
  single.style.display="none";
  comboWrap.style.display="block";
  quizWrap.style.display="none";
  generate();
}

function startSingleQuiz(){
  mode="singleQuiz";
  resetScore();
  openApp("단일문자 퀴즈", "문자의 발음을 직접 입력합니다.");
  single.style.display="none";
  comboWrap.style.display="none";
  quizWrap.style.display="block";
  generate();
}

function startComboQuiz(){
  mode="comboQuiz";
  resetScore();
  openApp("조합연습 퀴즈", "조합된 글자의 발음을 직접 입력합니다.");
  single.style.display="none";
  comboWrap.style.display="none";
  quizWrap.style.display="block";
  generate();
}

function openApp(title, hint){
  menuWrap.style.display="none";
  app.style.display="block";
  modeTitle.innerText=title;
  hintBadge.innerText=hint;
}

function goMenu(){
  mode="";
  app.style.display="none";
  menuWrap.style.display="block";
  toast("모드 선택으로 이동");
}

// ===== 생성 =====
function generate(){
  if(mode==="single"){
    let h = pick(hira);
    let k;
    do { k = toKata(pick(hira)); }
    while(k===toKata(h));

    hiraChar.innerText=h;
    kataChar.innerText=k;
    hiraPron.innerText="";
    kataPron.innerText="";
    pop(single);
  }

  if(mode==="combo"){
    let len=Math.floor(Math.random()*3)+3;
    let source=Math.random()<0.5 ? hira : hira.map(toKata);

    let text="", pron="";
    for(let i=0;i<len;i++){
      let c=pick(source);
      text+=c;
      pron+=getPron(c);
    }

    comboText.innerText=text;
    comboPron.innerText="";
    comboText.dataset.pron=pron;
    pop(comboWrap);
  }

  if(mode==="singleQuiz"){
    const useKata=Math.random()<0.5;
    const h=pick(hira);
    const q=useKata ? toKata(h) : h;
    const type=useKata ? "가타카나" : "히라가나";
    setQuizQuestion(q, getPron(q), type + " 단일문자 발음 입력");
  }

  if(mode==="comboQuiz"){
    let len=Math.floor(Math.random()*3)+3;
    let source=Math.random()<0.5 ? hira : hira.map(toKata);
    let text="", pron="";

    for(let i=0;i<len;i++){
      let c=pick(source);
      text+=c;
      pron+=getPron(c);
    }

    const type = /[\u30a1-\u30f6]/.test(text) ? "가타카나" : "히라가나";
    setQuizQuestion(text, pron, type + " 조합 발음 입력");
  }
}

function setQuizQuestion(text, pron, label){
  quizAnswered=false;
  quizLabel.innerText=label;
  quizText.innerText=text;
  quizText.dataset.pron=pron;
  quizInput.value="";
  quizInput.disabled=false;
  quizInput.className="";
  quizFeedback.innerText="";
  quizFeedback.className="feedback";
  quizAnswer.innerText="";
  pop(quizWrap);
  setTimeout(()=>quizInput.focus(), 30);
}

// ===== 정답 =====
function showAnswer(){
  if(mode==="single"){
    hiraPron.innerText=getPron(hiraChar.innerText);
    kataPron.innerText=getPron(kataChar.innerText);
    toast("발음 표시");
  }

  if(mode==="combo"){
    comboPron.innerText=comboText.dataset.pron;
    toast("발음 표시");
  }

  if(mode==="singleQuiz" || mode==="comboQuiz"){
    checkQuiz(true);
  }
}

function checkQuiz(forceShow){
  if(!(mode==="singleQuiz" || mode==="comboQuiz")) return;
  if(quizAnswered) return;

  const user=normalizeAnswer(quizInput.value);
  const answer=normalizeAnswer(quizText.dataset.pron);

  if(!user && !forceShow){
    toast("발음을 입력하세요");
    quizInput.focus();
    return;
  }

  quizAnswered=true;
  quizInput.disabled=true;

  if(user===answer){
    score.correct++;
    quizInput.classList.add("correct");
    quizFeedback.innerText="정답";
    quizFeedback.classList.add("correct");
    quizAnswer.innerText=answer;
    toast("정답입니다");
  }else{
    score.wrong++;
    quizInput.classList.add("wrong");
    quizFeedback.innerText=user ? "오답" : "정답 공개";
    quizFeedback.classList.add("wrong");
    quizAnswer.innerText="정답: " + answer;
    toast("정답을 확인하세요");
  }

  updateScore();
}

function resetScore(){
  score={correct:0, wrong:0};
  updateScore();
}

function updateScore(){
  const total=score.correct+score.wrong;
  const rate=total ? Math.round(score.correct/total*100) : 0;
  correctCount.innerText=score.correct;
  wrongCount.innerText=score.wrong;
  accuracy.innerText=rate + "%";
  progressBar.style.width=rate + "%";
}

// ===== 키 =====
document.addEventListener("keydown",e=>{
  if(e.key==="1"){
    if(mode==="") startSingle();
    else showAnswer();
  }

  if(e.key==="2"){
    if(mode==="") startCombo();
    else generate();
  }

  if(e.key==="3"){
    if(mode==="") startSingleQuiz();
    else goMenu();
  }

  if(e.key==="4" && mode===""){
    startComboQuiz();
  }

  if(e.key==="Enter" && (mode==="singleQuiz" || mode==="comboQuiz")){
    e.preventDefault();
    if(quizAnswered) generate();
    else checkQuiz(false);
  }
});
</script>
</body>
</html>
